global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: "ml-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["ml-api:8000"]
        labels:
          service: "iris-classifier"
          env: "lab"

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
